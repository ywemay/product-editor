<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products Editor</title>
<link rel="stylesheet" href="src/style.css">
<script src="src/app.js"></script>
</head>
<body>
<div id="app">
    <!-- Start page -- file picker -->
    <div id="start-page" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:20px">
        <div style="font-size:64px;opacity:0.4">📦</div>
        <h2 style="color:var(--text-secondary);font-weight:400">Open a .prod file to edit</h2>
        <div style="display:flex;gap:12px">
            <button class="btn btn-primary" id="btn-open-file" style="font-size:16px;padding:12px 28px">📂 Open File</button>
            <button class="btn" id="btn-open-file-dialog" style="font-size:16px;padding:12px 28px">🔍 Browse...</button>
        </div>
        <p style="margin-top:24px;font-size:12px;color:var(--text-muted)">
            Products Editor v1.0.0 — Drag & drop .prod files onto this window
        </p>
    </div>

    <!-- Editor view (hidden initially) -->
    <div id="editor-view" style="display:none;flex-direction:column;height:100vh">
        <!-- Top bar -->
        <div id="editor-topbar" style="display:flex;align-items:center;padding:8px 16px;background:var(--bg-secondary);border-bottom:1px solid var(--border);gap:10px">
            <span id="editor-icon" style="font-size:20px">📦</span>
            <span id="editor-filename" style="font-weight:600;flex:1;font-size:14px"></span>
            <span id="editor-modified" style="font-size:11px;color:var(--accent-yellow);display:none">✏️ Modified</span>
            <button class="btn btn-sm" id="btn-close-file" title="Close file">✕ Close</button>
            <button class="btn btn-sm btn-primary" id="btn-save">💾 Save</button>
            <button class="btn btn-sm" id="btn-save-as">Save As...</button>
        </div>

        <!-- Tab bar -->
        <div id="tabs" style="display:flex;gap:2px;padding:0 12px;background:var(--bg-secondary);border-bottom:1px solid var(--border)">
            <button class="tab-btn active" data-tab="photos">🖼️ Photos</button>
            <button class="tab-btn" data-tab="variations">🏷️ Variations</button>
            <button class="tab-btn" data-tab="prices">💲 Prices</button>
            <button class="tab-btn" data-tab="description">📝 Description</button>
        </div>

        <!-- Tab content -->
        <div id="tab-content" style="flex:1;overflow-y:auto;padding:16px"></div>
    </div>
</div>

<script src="src/main.js"></script>
</body>
</html>
