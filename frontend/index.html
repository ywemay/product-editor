<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products Editor</title>
<link rel="stylesheet" href="src/style.css">
<script src="src/app.js"></script>
</head>
<body>
<div id="app">
    <!-- Editor view (always shown) -->
    <div id="editor-view" style="display:flex;flex-direction:column;height:100vh">
        <!-- Top bar -->
        <div id="editor-topbar" style="display:flex;align-items:center;padding:8px 16px;background:var(--bg-secondary);border-bottom:1px solid var(--border);gap:10px">
            <span id="editor-icon" style="font-size:20px">📦</span>
            <span id="editor-filename" style="font-weight:600;flex:1;font-size:14px"></span>
            <span id="editor-modified" style="font-size:11px;color:var(--accent-yellow);display:none">✏️ Modified</span>
            <button class="btn btn-sm" id="btn-open-file" title="Open file" style="display:none">📂 Open</button>
            <button class="btn btn-sm" id="btn-settings" title="Settings">⚙️</button>
            <button class="btn btn-sm" id="btn-close-file" title="Close file" style="display:none">✕ Close</button>
            <button class="btn btn-sm" id="btn-send" title="Share product" style="display:none">📤 Send</button>
            <button class="btn btn-sm btn-primary" id="btn-save" style="display:none">💾 Save</button>
            <button class="btn btn-sm" id="btn-save-as" style="display:none">Save As...</button>
            <span class="topbar-divider" id="tb-divider" style="display:none"></span>
            <div class="topbar-price-form" id="topbar-price-form" style="display:none;align-items:center;gap:6px">
                <input type="number" id="tb-price-input" step="0.01" placeholder="Price" style="width:80px;font-size:12px;padding:3px 6px" />
                <input type="text" id="tb-currency-input" value="USD" maxlength="3" style="width:45px;font-size:12px;padding:3px 6px" />
                <select id="tb-variation-select" style="font-size:12px;padding:3px 6px;max-width:120px">
                    <option value="">All</option>
                </select>
                <button class="btn btn-xs btn-primary" id="tb-add-price-btn">➕ Add Price</button>
            </div>
        </div>

        <!-- Tab bar -->
        <div id="tabs" style="display:flex;gap:2px;padding:0 12px;background:var(--bg-secondary);border-bottom:1px solid var(--border)">
            <button class="tab-btn active" data-tab="product">🖼️ Product</button>
            <button class="tab-btn" data-tab="variations">🏷️ Variations</button>
        </div>

        <!-- Tab content -->
        <div id="tab-content" style="flex:1;overflow-y:auto;padding:16px"></div>
    </div>
</div>

<script src="src/main.js"></script>

<!-- Settings Modal -->
<div id="settings-modal" class="modal-overlay" style="display:none">
    <div class="modal">
        <h3>Settings</h3>
        <div class="form-group">
            <label>Default Currency</label>
            <select id="settings-currency">
                <option value="CNY">CNY (¥)</option>
                <option value="USD">USD ($)</option>
                <option value="EUR">EUR (€)</option>
                <option value="GBP">GBP (£)</option>
                <option value="JPY">JPY (¥)</option>
                <option value="RUB">RUB (₽)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Language</label>
            <select id="settings-language">
                <option value="en">English</option>
                <option value="zh">中文</option>
                <option value="ru">Русский</option>
            </select>
        </div>
        <div class="modal-actions">
            <button class="btn" id="settings-cancel-btn">Cancel</button>
            <button class="btn btn-primary" id="settings-save-btn">Save</button>
        </div>
    </div>
</div>
</body>
</html>
