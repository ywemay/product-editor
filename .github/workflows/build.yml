name: Build Products Desktop Editor

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04, windows-latest, macos-14]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-gi python3-gi-cairo \
            gir1.2-gtk-3.0 gir1.2-webkit2-4.1 \
            libgirepository1.0-dev \
            libcairo2-dev pkg-config

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller \
            --onedir --windowed --name "Products-Editor-Linux" \
            --add-data "frontend:frontend" \
            --hidden-import prodlib \
            --hidden-import prodlib.core \
            --hidden-import prodlib.store \
            --hidden-import bottle \
            app.py

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller `
            --onedir --windowed --name "Products-Editor" `
            --add-data "frontend;frontend" `
            --hidden-import prodlib `
            --hidden-import prodlib.core `
            --hidden-import prodlib.store `
            --hidden-import bottle `
            app.py

      - name: Build with PyInstaller (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller \
            --onedir --windowed --name "Products-Editor" \
            --add-data "frontend:frontend" \
            --icon app.icns \
            --hidden-import prodlib \
            --hidden-import prodlib.core \
            --hidden-import prodlib.store \
            --hidden-import bottle \
            app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Products-Editor-${{ runner.os }}
          path: |
            dist/Products-Editor-Linux
            dist/Products-Editor
            dist/Products-Editor.app
          if-no-files-found: warn
